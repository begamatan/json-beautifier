services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      PORT: "8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
